<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e8d0ff"/>
      <stop offset="50%" stop-color="#9b30d0"/>
      <stop offset="100%" stop-color="#2a0050"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#1a0035" stroke="#cc88ff" stroke-width="2"/>
  <!-- Coin body -->
  <circle cx="100" cy="100" r="88" fill="url(#bg)"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#cc88ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Shine -->
  <circle cx="100" cy="100" r="88" fill="url(#shine)"/>
  <!-- Crown icon -->
  <g filter="url(#glow)" fill="#e8c8ff" stroke="#cc88ff" stroke-width="1">
    <polygon points="100,54 115,74 134,64 128,88 72,88 66,64 85,74" fill="#cc88ff" stroke="#e8c8ff" stroke-width="1.5"/>
    <rect x="72" y="88" width="56" height="10" rx="2" fill="#cc88ff"/>
  </g>
  <!-- Label -->
  <text x="100" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#e8c8ff" letter-spacing="2">CHAMPION</text>
  <text x="100" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#cc88ff" letter-spacing="1">3,500 TOKENS</text>
  <!-- Bottom ornament -->
  <line x1="72" y1="148" x2="128" y2="148" stroke="#cc88ff" stroke-width="1" opacity="0.5"/>
  <circle cx="100" cy="148" r="2.5" fill="#cc88ff" opacity="0.8"/>
</svg>
