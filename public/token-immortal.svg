<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg2" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#7a4a00"/>
    </radialGradient>
    <radialGradient id="shine2" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#2a1800" stroke="#ffd700" stroke-width="2.5"/>
  <!-- Coin body -->
  <circle cx="100" cy="100" r="88" fill="url(#bg2)"/>
  <!-- Inner rings -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="#ffeeaa" stroke-width="0.5" opacity="0.4"/>
  <!-- Shine -->
  <circle cx="100" cy="100" r="88" fill="url(#shine2)"/>
  <!-- Star / infinity symbol -->
  <g filter="url(#glow2)">
    <!-- 8-pointed star -->
    <polygon points="100,52 106,72 118,60 112,80 132,74 116,88 132,96 112,96 118,116 106,104 100,124 94,104 82,116 88,96 68,96 84,88 68,74 88,80 82,60 94,72" fill="#fff0a0" stroke="#ffd700" stroke-width="1" opacity="0.9"/>
    <circle cx="100" cy="88" r="10" fill="#ffd700" stroke="#fff0a0" stroke-width="1.5"/>
  </g>
  <!-- Label -->
  <text x="100" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#fff8e0" letter-spacing="2">IMMORTAL</text>
  <text x="100" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#ffd700" letter-spacing="1">8,500 TOKENS</text>
  <!-- Bottom ornament -->
  <line x1="68" y1="148" x2="132" y2="148" stroke="#ffd700" stroke-width="1" opacity="0.6"/>
  <polygon points="100,144 103,149 97,149" fill="#ffd700" opacity="0.8"/>
</svg>
