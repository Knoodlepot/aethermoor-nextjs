function UserProfileModal({ email, onClose, onEmailChange, onPasswordChange }) {
  const [mode, setMode] = React.useState('main');
  const [newEmail, setNewEmail] = React.useState(email || '');
  const [pw, setPw] = React.useState('');
  const [newPw, setNewPw] = React.useState('');
  const [confPw, setConfPw] = React.useState('');
  const [msg, setMsg] = React.useState('');
  const [err, setErr] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const inputStyle = { width:'100%', background:'#0d0a06', border:'1px solid #2e2010', color:'#d4b896', padding:'10px 14px', fontSize:15, fontFamily:'Georgia,serif', outline:'none', borderRadius:4, boxSizing:'border-box' };
  const btnStyle   = { width:'100%', background:'#c9a84c22', border:'1px solid #c9a84c', color:'#c9a84c', padding:'11px', fontSize:15, fontFamily:'Cinzel,serif', letterSpacing:'0.06em', cursor:'pointer', borderRadius:4, marginTop:8 };
  const linkStyle  = { color:'#c9a84c', background:'none', border:'none', cursor:'pointer', fontSize:13, textDecoration:'underline', padding:0 };
  const labelStyle = { color:'#7a6040', fontSize:12, letterSpacing:'0.05em', display:'block', marginBottom:4, fontFamily:'Cinzel,serif' };

  async function handleEmailChange(e) {
    e.preventDefault(); setErr(''); setMsg(''); setLoading(true);
    try {
      const token = getAuthToken();
      const res = await fetch(`${BACKEND_URL}/auth/change-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ newEmail, password: pw })
      });
      const data = await res.json();
      if (!res.ok) { setErr(data.error || data.message || 'Change failed'); return; }
      if (data.token) setAuthToken(data.token);
      setMsg('Email updated!');
      if (onEmailChange) onEmailChange(newEmail);
    } catch { setErr('Could not reach the server.'); }
    finally { setLoading(false); }
  }

  async function handlePasswordChange(e) {
    e.preventDefault(); setErr(''); setMsg(''); setLoading(true);
    if (newPw !== confPw) { setErr('Passwords do not match'); setLoading(false); return; }
    if (newPw.length < 8) { setErr('Password too short'); setLoading(false); return; }
    try {
      const token = getAuthToken();
      const res = await fetch(`${BACKEND_URL}/auth/change-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ currentPassword: pw, newPassword: newPw })
      });
      const data = await res.json();
      if (!res.ok) { setErr(data.error || data.message || 'Change failed'); return; }
      setMsg('Password updated!');
      if (onPasswordChange) onPasswordChange();
    } catch { setErr('Could not reach the server.'); }
    finally { setLoading(false); }
  }

  return React.createElement('div', {
    style: { display:'flex', alignItems:'center', justifyContent:'center', position:'fixed', inset:0, background:'#0d0d1aee', zIndex:9999, fontFamily:'Georgia,serif', color:'#ccc', padding:'2rem' },
    role: 'dialog', 'aria-modal': true, 'aria-label': 'User Profile'
  },
    React.createElement('div', { style:{ width:'100%', maxWidth:380, background:'#18141a', borderRadius:8, boxShadow:'0 2px 16px #000a', padding:24 } },
      React.createElement('div', { style:{ textAlign:'center', marginBottom:18 } },
        React.createElement('h3', { style:{ color:'#c9a84c', fontSize:'1.2rem', letterSpacing:'0.08em', fontFamily:'Cinzel,serif', marginBottom:4 } }, 'Account Settings')
      ),
      mode === 'main' && React.createElement('div', {},
        React.createElement('div', { style:{ marginBottom:18, fontSize:15 } },
          React.createElement('b', null, 'Email:'), ' ', email
        ),
        React.createElement('button', { style: btnStyle, onClick:()=>{ setMode('email'); setErr(''); setMsg(''); setPw(''); } }, 'Change Email'),
        React.createElement('button', { style: btnStyle, onClick:()=>{ setMode('pw'); setErr(''); setMsg(''); setPw(''); setNewPw(''); setConfPw(''); }, tabIndex:0 }, 'Change Password'),
        React.createElement('button', { style: btnStyle, onClick:onClose, tabIndex:0 }, 'Close')
      ),
      mode === 'email' && React.createElement('form', { onSubmit: handleEmailChange },
        React.createElement('label', { style: labelStyle, htmlFor:'new-email' }, 'New Email'),
        React.createElement('input', { id:'new-email', type:'email', value:newEmail, onChange:e=>setNewEmail(e.target.value), style:inputStyle, required:true, autoComplete:'email' }),
        React.createElement('label', { style: labelStyle, htmlFor:'pw-email' }, 'Current Password'),
        React.createElement('input', { id:'pw-email', type:'password', value:pw, onChange:e=>setPw(e.target.value), style:inputStyle, required:true, autoComplete:'current-password' }),
        err && React.createElement('div', { style:{ color:'#e05050', fontSize:13, marginBottom:10, textAlign:'center' } }, err),
        msg && React.createElement('div', { style:{ color:'#80c060', fontSize:13, marginBottom:10, textAlign:'center' } }, msg),
        React.createElement('button', { type:'submit', style:btnStyle, disabled:loading }, loading ? 'Please wait...' : 'Update Email'),
        React.createElement('button', { type:'button', style:linkStyle, onClick:()=>{ setMode('main'); setErr(''); setMsg(''); } }, 'Cancel')
      ),
      mode === 'pw' && React.createElement('form', { onSubmit: handlePasswordChange },
        React.createElement('label', { style: labelStyle, htmlFor:'pw-current' }, 'Current Password'),
        React.createElement('input', { id:'pw-current', type:'password', value:pw, onChange:e=>setPw(e.target.value), style:inputStyle, required:true, autoComplete:'current-password' }),
        React.createElement('label', { style: labelStyle, htmlFor:'pw-new' }, 'New Password'),
        React.createElement('input', { id:'pw-new', type:'password', value:newPw, onChange:e=>setNewPw(e.target.value), style:inputStyle, required:true, autoComplete:'new-password', minLength:8 }),
        React.createElement('label', { style: labelStyle, htmlFor:'pw-conf' }, 'Confirm New Password'),
        React.createElement('input', { id:'pw-conf', type:'password', value:confPw, onChange:e=>setConfPw(e.target.value), style:inputStyle, required:true, autoComplete:'new-password', minLength:8 }),
        err && React.createElement('div', { style:{ color:'#e05050', fontSize:13, marginBottom:10, textAlign:'center' } }, err),
        msg && React.createElement('div', { style:{ color:'#80c060', fontSize:13, marginBottom:10, textAlign:'center' } }, msg),
        React.createElement('button', { type:'submit', style:btnStyle, disabled:loading }, loading ? 'Please wait...' : 'Update Password'),
        React.createElement('button', { type:'button', style:linkStyle, onClick:()=>{ setMode('main'); setErr(''); setMsg(''); } }, 'Cancel')
      )
    )
  );
}

const { useState, useEffect, useRef } = React;
async function storageGet(key) {
  const val = localStorage.getItem("aethermoor_" + key);
  if (val === null) throw new Error("not found");
  return { key, value: val };
}
async function storageSet(key, value) {
  try {
    localStorage.setItem("aethermoor_" + key, value);
    return { key, value };
  } catch (e) {
    return null;
  }
}
async function storageDelete(key) {
  localStorage.removeItem("aethermoor_" + key);
  return { key, deleted: true };
}

function getSaveSlotKey(slot) { return "aethermoor_save_slot_" + slot; }
function readSaveSlot(slot) {
  try { const raw = localStorage.getItem(getSaveSlotKey(slot)); return raw ? JSON.parse(raw) : null; }
  catch(e) { return null; }
}
function writeSaveSlot(slot, player, worldSeed, messages, narrative, log) {
  const data = { slot, savedAt: new Date().toISOString(), playerName: player.name, playerClass: player.class, playerLevel: player.level, playerLocation: player.location, player: JSON.stringify(player), worldSeed: JSON.stringify(worldSeed), messages: JSON.stringify((messages||[]).slice(-20)), narrative: narrative||"", log: JSON.stringify((log||[]).slice(-60)) };
  localStorage.setItem(getSaveSlotKey(slot), JSON.stringify(data));
}
function deleteSaveSlot(slot) { localStorage.removeItem(getSaveSlotKey(slot)); }
function loadSaveSlot(slot) {
  const data = readSaveSlot(slot);
  if (!data) return null;
  try { return { player: JSON.parse(data.player), worldSeed: JSON.parse(data.worldSeed), messages: data.messages ? JSON.parse(data.messages) : [], narrative: data.narrative||"", log: data.log ? JSON.parse(data.log) : [] }; }
  catch(e) { return null; }
}

function getItemInfo(itemName) {
  const cleaned = itemName.toLowerCase().replace(/x\d+$/, "").replace(/\s+x\s*\d+$/, "").trim();
  if (ITEM_INFO[cleaned]) return ITEM_INFO[cleaned];
  for (const [key, val] of Object.entries(ITEM_INFO)) {
    if (cleaned.includes(key) || key.includes(cleaned)) return val;
  }
  return null;
}

function isDisguisedItem(itemName) {
  const lower = itemName.toLowerCase().replace(/x\d+$/, "").replace(/\s+x\s*\d+$/, "").trim();
  return lower in DISGUISED_ITEMS;
}
function getDisguisedItemTrueName(mundaneName) {
  const lower = mundaneName.toLowerCase().replace(/x\d+$/, "").replace(/\s+x\s*\d+$/, "").trim();
  return DISGUISED_ITEMS[lower]?.trueName || null;
}
function getDisguisedItemDisplay(itemName, isRevealed) {
  const lower = itemName.toLowerCase().replace(/x\d+$/, "").replace(/\s+x\s*\d+$/, "").trim();
  const disguisedDef = DISGUISED_ITEMS[lower];
  if (!disguisedDef) return null;
  if (isRevealed) {
    return {
      icon: disguisedDef.trueIcon,
      name: disguisedDef.trueName,
      desc: disguisedDef.trueDesc,
      type: disguisedDef.trueType,
      isRevealed: true
    };
  }
  // Return mundane version (use normal ITEM_INFO)
  return {
    ...getItemInfo(lower),
    name: itemName.split(/\s+x\s*\d+/i)[0], // mundane name
    isRevealed: false
  };
}

function getItemSlot(itemName) {
  const info = getItemInfo(itemName);
  if (!info) return null;
  const name = itemName.toLowerCase();
  if (info.type === "Weapon") return "weapon";
  if (info.type === "Magic") {
    if (name.includes("ring") || name.includes("amulet") || name.includes("badge") || name.includes("compass") || name.includes("sigil") || name.includes("focus") || name.includes("cloak")) return "accessory";
    return "accessory";
  }
  if (info.type === "Armour") {
    if (name.includes("shield") || name.includes("pauldron")) return "offhand";
    if (name.includes("helm") || name.includes("hood") || name.includes("crown") || name.includes("hat") || name.includes("cap") || name.includes("antler")) return "head";
    if (name.includes("boot") || name.includes("sandal") || name.includes("shoe")) return "feet";
    return "body";
  }
  return null;
}

function getEquipmentBonuses(equipped) {

  const availableTiers = ["basic"];
  if (tierIdx >= 1) availableTiers.push("uncommon");
  if (tierIdx >= 2) availableTiers.push("rare");
  if (tierIdx >= 3) availableTiers.push("legendary");
  const playerLevel = player?.level || 1;
  let pool = [
    ...SHOP_ITEMS.filter((item) => {
      if (item.exclusive && !perks.exclusive) return false;
      return availableTiers.includes(item.tier);
    }),
    ...TIERED_GEAR.filter((item) => {
      if (!availableTiers.includes(item.shopTier)) return false;
      return playerLevel >= item.minLevel;
    })
  ];
  const counts = { village: 6, town: 8, city: 10, capital: 12 };
  const count = counts[tier] || 6;
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  let stock = shuffled.slice(0, count);
  if (perks.hiddenItem) {
    const higherPool = SHOP_ITEMS.filter((i) => !stock.find((s) => s.id === i.id) && (i.tier === "rare" || i.tier === "legendary") && (!i.exclusive || perks.exclusive));
    if (higherPool.length > 0) {
      const bonus = higherPool[Math.floor(Math.random() * higherPool.length)];
      stock = [...stock, { ...bonus, isHidden: true }];
    }
  }
  return stock;
}

          rulerTitle[Math.floor(Math.random()*rulerTitle.length)] + " " +

      industry: config.industries,
      ruler: mkRuler(n)
    });

  // Based on medieval England ratios: the larger the settlement,
  // the more farms cluster around it to feed it.
  add("capital", "Aethermoor Capital");   // 1 capital
  for(let i=0; i<6; i++)  add("city");   // 6 cities
  for(let i=0; i<10; i++) add("town");   // 10 towns
  for(let i=0; i<16; i++) add("village");// 16 villages
  for(let i=0; i<35; i++) add("hamlet"); // 35 hamlets

  // ── Farms: historically tied to settlement size ───────────────────────────
  // Capital feeds thousands — needs 5-7 surrounding farms
  // Cities need 3-5 farms each, towns 2-3, villages 1-2, hamlets 0-1
  // Randomised within each range for variety
  const farmTypes = ["farm_arable","farm_livestock","farm_mixed"];
  const farmRanges = { capital:[5,7], city:[3,5], town:[2,3], village:[1,2], hamlet:[0,1] };

  const poiNames = {

    for(let i=0; i<count; i++) {
      const name = names[i % names.length];
      const nearSettlement = mainSettlements[Math.floor(Math.random()*mainSettlements.length)];
      world.push({
        name, type,
        icon: SETTLEMENT_TYPES[type].icon,
        populace: 0,
        industry: SETTLEMENT_TYPES[type].industries,
        parentSettlement: nearSettlement.name,
        isPOI: true,
        miniBoss: bosses[Math.floor(Math.random()*bosses.length)],
        treasureLoot: loot[Math.floor(Math.random()*loot.length)],
        bossDefeated: false,
        ruler: null
      });
    }
  });

  // ── Assign map coordinates ──────────────────────────────────────────────
  // Each game the world is laid out differently — random but structured
  (() => {
    const rand = (mn,mx) => mn + Math.random()*(mx-mn);
    const angle = () => Math.random()*Math.PI*2;
    const clamp = (v,mn,mx) => Math.max(mn,Math.min(mx,v));
    const placed = {};
    const set = (name,x,y) => { placed[name]={x:clamp(x,4,96),y:clamp(y,4,96)}; };

    // Capital at rough centre with slight random offset
    const cap = world.find(w=>w.type==='capital');
    set(cap.name, rand(44,56), rand(44,56));

    // Cities in a ring around capital
    const cities = world.filter(w=>w.type==='city');
    cities.forEach((c,i)=>{
      const a = (i/cities.length)*Math.PI*2 + rand(-0.4,0.4);
      const d = rand(16,26);
      const cp = placed[cap.name];
      set(c.name, cp.x+Math.cos(a)*d, cp.y+Math.sin(a)*d);
    });

    // Towns near a random city
    const towns = world.filter(w=>w.type==='town');
    towns.forEach(t=>{
      const par = cities[Math.floor(Math.random()*cities.length)];
      const pp = placed[par.name];
      set(t.name, pp.x+Math.cos(angle())*rand(7,15), pp.y+Math.sin(angle())*rand(7,15));
    });

    // Villages near a random town or city
    const villages = world.filter(w=>w.type==='village');
    const tv = [...cities,...towns];
    villages.forEach(v=>{
      const par = tv[Math.floor(Math.random()*tv.length)];
      const pp = placed[par.name];
      set(v.name, pp.x+Math.cos(angle())*rand(5,12), pp.y+Math.sin(angle())*rand(5,12));
    });

    // Hamlets near a random village or town
    const hamlets = world.filter(w=>w.type==='hamlet');
    const tvh = [...towns,...villages];
    hamlets.forEach(h=>{
      const par = tvh[Math.floor(Math.random()*tvh.length)];
      const pp = placed[par.name] || placed[cap.name];
      set(h.name, pp.x+Math.cos(angle())*rand(3,8), pp.y+Math.sin(angle())*rand(3,8));
    });

    // Farms very close to parent
    world.filter(w=>w.parentSettlement&&!w.isPOI).forEach(farm=>{
      const pp = placed[farm.parentSettlement] || placed[cap.name];
      set(farm.name, pp.x+Math.cos(angle())*rand(2,5), pp.y+Math.sin(angle())*rand(2,5));
    });

    // POIs near parent settlement
    world.filter(w=>w.isPOI).forEach(poi=>{
      const pp = placed[poi.parentSettlement] || placed[cap.name];
      set(poi.name, pp.x+Math.cos(angle())*rand(4,10), pp.y+Math.sin(angle())*rand(4,10));
    });

    // Write coordinates back
    world.forEach(w=>{
      const p = placed[w.name];
      w.mapX = p ? p.x : rand(10,90);
      w.mapY = p ? p.y : rand(10,90);
    });
  })();

  return world;
}

const ROAD_NAMES = [
  "The King's Road","The Merchant Way","The Old North Road","The Salt Road",
  "The River Road","The Forest Path","The High Road","The Pilgrim's Way",

const ROAD_TERRAINS = [
  "rolling farmland","dense woodland","open moorland","river valley",
  "rocky hillside","marshy lowland","ancient forest","coastal cliffs"
];
const ROAD_DANGER = { capital:1, city:1, town:2, village:2, hamlet:3 };

// Road type is determined by the settlement tiers it connects:
//  highway  — capital ↔ capital/city, city ↔ city
//  road     — city/capital ↔ town, town ↔ town
//  dirt     — town/city ↔ village/hamlet, village ↔ hamlet, hamlet ↔ hamlet
//  trail    — anything ↔ POI
//  track    — anything ↔ farm
const ROAD_TYPE_NAMES = {
  highway: ["The King's Road","The Imperial Way","The High Road","The Royal Road","The Great North Road","The Queen's Highway"],
  road:    ["The Merchant Way","The Old Road","The Salt Road","The River Road","The Eastern Road","The Western Road","The Mill Road","The Pilgrim's Way"],
  dirt:    ["The Drovers' Track","The Hollow Way","The Old Lane","The Common Road","The Village Road","The Back Lane","The Shepherd's Path"],
  trail:   ["The Forest Path","The Hunters' Trail","The Old Footpath","The Hidden Way","The Winding Trail","The Smugglers' Path"],
  track:   ["The Farm Track","The Field Road","The Cart Track","The Drove Road"],
};
const getRoadType = (typeA, typeB) => {
  const big   = ['capital','city'];
  const mid   = ['town'];
  const small = ['hamlet','village'];
  const farm  = ['farm_arable','farm_livestock','farm_mixed'];
  const poi   = ['poi_forest','poi_cave','poi_ruins','poi_wood','poi_shrine'];
  if (poi.includes(typeA) || poi.includes(typeB)) return 'trail';
  if (farm.includes(typeA) || farm.includes(typeB)) return 'track';
  if (big.includes(typeA)   && big.includes(typeB))   return 'highway';
  if ((big.includes(typeA)  && mid.includes(typeB))  || (mid.includes(typeA)  && big.includes(typeB)))  return 'road';
  if (mid.includes(typeA)   && mid.includes(typeB))   return 'road';
  return 'dirt';
};

// ── Shared fetch helper — always calls your backend, never Anthropic directly ──
async function backendFetch(payload, onTokenUpdate) {
  // 25-second timeout — prevents the spinner hanging forever on network issues
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 25000);

  const token = getAuthToken();
  let res;
  try {
    res = await fetch(`${BACKEND_URL}/api/claude`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify(payload),
      signal: controller.signal,
    });
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === "AbortError") {
      return `The narrator loses the thread — the vision took too long to form.\n\nThe connection timed out. Check your internet and try again.\n\n{"context":"explore"}`;
    }
    return `The world flickers, as if reality itself stumbled.\n\nCould not reach the story. Check your connection and try again.\n\n{"context":"explore"}`;
  }
  clearTimeout(timeoutId);

  // Session expired — clear auth and prompt re-login
  if (res.status === 401) {
    clearAuth();
    window.dispatchEvent(new Event('aethermoor:session-expired'));
    return `The world grows dark — your session has expired. Please log in again.\n\n{"context":"explore"}`;
  }

  // Rate limit hit — show a friendly in-game message
  if (res.status === 429) {
    const err = await res.json().catch(() => ({}));
    return `The narrator pauses to catch their breath.\n\n${err.message || "Too many actions at once — give it a moment and try again."}\n\n{"context":"explore"}`;
  }

  // Out of tokens
  if (res.status === 402) {
    return `__OUT_OF_TOKENS__`;
  }

  // Other server error
  if (!res.ok) {
    let errDetail = res.status;
    try { const ed = await res.clone().json(); if (ed.message) errDetail = res.status + ': ' + ed.message; } catch(_) {}
    return `The world flickers, as if reality itself stumbled.\n\nSomething went wrong reaching the story (${errDetail}). Please try again in a moment.\n\n{"context":"explore"}`;
  }

  const d = await res.json();
  // Update token balance from backend response
  if (typeof d.tokenBalance === 'number' && onTokenUpdate) {
    onTokenUpdate(d.tokenBalance);
  }
  return d.content?.map((b) => b.text || "").join("") || "The world grows silent...";
}

// ── System type detection ──────────────────────────────────────
// The 2nd arg to callClaude is now either:
//   • An object  { player, worldSeed }  → systemType 'NARRATOR'  (server builds full prompt)
//   • An object  { systemType, requestData } → server builds both system + user prompt
//   • A sentinel string                  → mapped to server-side fixed prompt enum
//   • Anything else                      → 'NARRATOR_MINI'
function resolveSystemType(systemOrContext) {
  if (systemOrContext && typeof systemOrContext === 'object') {
    if (systemOrContext.systemType) {
      return { systemType: systemOrContext.systemType, requestData: systemOrContext.requestData || undefined };
    }
    return { systemType: 'NARRATOR', playerContext: systemOrContext };
  }
  if (typeof systemOrContext === 'string') {
    if (systemOrContext.includes('quest parser'))    return { systemType: 'QUEST_PARSER' };
    if (systemOrContext.includes('name enemies'))    return { systemType: 'ENEMY_NAMER' };
    if (systemOrContext.includes('moderation filter')) return { systemType: 'SCREENER' };
  }
  return { systemType: 'NARRATOR_MINI' };
}

async function callClaude(messages, systemOrContext, _playerIdArg, onTokenUpdate) {
  // playerId is now derived from the JWT on the server — client no longer sends it
  const { systemType, playerContext, requestData } = resolveSystemType(systemOrContext);
  return backendFetch({
    systemType,
    playerContext: playerContext || undefined,
    requestData: requestData || undefined,
    max_tokens: 1500,
    messages,
  }, onTokenUpdate);
}

function generateLieutenant(playerLevel, worldSeed) {
  const archetypeId = LIEUTENANT_ARCHETYPES[worldSeed.templateId] || "soldier";
  const archetype = ENEMY_ARCHETYPES[archetypeId];
  const tierData = ENEMY_TIERS[3];
  const levelScale = 1 + (playerLevel - 1) * 0.12;
  const mult = tierData.mult * levelScale * 1.1;
  const enemy = {
    archetypeId,
    icon: archetype.icon,
    style: archetype.style,
    tier: "boss",
    tierLabel: "Lieutenant",
    isLieutenant: true,
    traits: ["armoured"],
    traitLabels: ["Armoured"],
    hp: Math.round(archetype.baseHp * mult * 1.3),
    str: Math.round(archetype.baseStr * mult),
    agi: Math.round(archetype.baseAgi * mult),
    def: Math.round(archetype.baseDef * mult) + 3,
    xpReward: Math.round(30 * archetype.xpMult * tierData.mult * levelScale * 3),
    goldReward: Math.round(10 * archetype.goldMult * tierData.mult * levelScale * 2),
    lootTier: 3,
    turnCount: 0,
    statusEffects: [],
    isBossPhase2: false,
    name: "",
    description: ""
  };
  enemy.hp = Math.max(40, enemy.hp);
  enemy.str = Math.max(8, enemy.str);
  enemy.def = Math.max(4, enemy.def);
  enemy.maxHp = enemy.hp;
  const armouredTrait = ENEMY_TRAITS.find((t) => t.id === "armoured");
  if (armouredTrait) armouredTrait.apply(enemy);

async function generateWorldGeography() {
  // Step 1: Collect major settlements for AI geography assignment
  const majorSettlements = WORLD_DATA.filter(s => ["capital","city","town"].includes(s.type));

  let geography = {};
  try {
    const res = await callClaude([], {
      systemType: "WORLD_GEOGRAPHER",
      requestData: { settlementNames: majorSettlements.map(s => s.name) }
    });
    const data = JSON.parse(res.replace(/```json|```/g, "").trim());
    geography = data.geography || {};
  } catch(e) { /* fallback: no geography flags */ }

  // Step 3: Build locationGrid for ALL settlements + POIs using existing mapX/mapY coords
  const locationGrid = {};
  WORLD_DATA.forEach(loc => {
    if (loc.mapX === undefined || loc.mapY === undefined) return;
    const geo = geography[loc.name] || {};
    const isCoastal = !!geo.coast;
    const hasHarbour = isCoastal && ["capital","city","town"].includes(loc.type) && (geo.harbour !== false);
    locationGrid[loc.name] = {
      x: Math.round(loc.mapX),
      y: Math.round(loc.mapY),
      type: loc.type,
      coast: isCoastal,
      river: !!geo.river,
      harbour: hasHarbour,
      parent: loc.parentSettlement || null,
      isPOI: !!loc.isPOI,
      note: geo.note || null
    };
  });

  // Step 4: Compute pairwise routes for capital+city tier from coordinates
  // 1 map unit ≈ 1.5h on foot — consistent, triangle-inequality guaranteed
  const keyLocs = WORLD_DATA.filter(s => ["capital","city"].includes(s.type));
  const routes = [];
  for (let i = 0; i < keyLocs.length; i++) {
    for (let j = i + 1; j < keyLocs.length; j++) {
      const a = keyLocs[i], b = keyLocs[j];
      const ax = locationGrid[a.name]?.x ?? a.mapX, ay = locationGrid[a.name]?.y ?? a.mapY;
      const bx = locationGrid[b.name]?.x ?? b.mapX, by = locationGrid[b.name]?.y ?? b.mapY;
      const hours = Math.max(4, Math.round(Math.sqrt((ax-bx)**2 + (ay-by)**2) * 1.5));
      const gA = geography[a.name] || {}, gB = geography[b.name] || {};
      routes.push({
        from: a.name, to: b.name, hours, terrain: "road",
        river: !!(gA.river || gB.river),
        coast: !!(gA.coast || gB.coast)
      });
    }
  }

  return { routes, geography, locationGrid };
}

function addProfessionXp(player, key, amount) {
  if (!PROFESSION_KEYS.includes(key) || amount <= 0) return player;
  const current = {
    survival: { level: getProfessionLevel(player, "survival"), xp: getProfessionXp(player, "survival") },
    social: { level: getProfessionLevel(player, "social"), xp: getProfessionXp(player, "social") },
    farming: { level: getProfessionLevel(player, "farming"), xp: getProfessionXp(player, "farming") },
    gathering: { level: getProfessionLevel(player, "gathering"), xp: getProfessionXp(player, "gathering") },
    crafting: { level: getProfessionLevel(player, "crafting"), xp: getProfessionXp(player, "crafting") }
  };
  const next = { ...current };
  next[key] = { ...next[key], xp: next[key].xp + amount };
  while (next[key].level < 5 && next[key].xp >= next[key].level * 60) {

}

  const s = scenes[context] || { bg: 'linear-gradient(180deg,#0a1020 0%,#14203a 50%,#0c1828 100%)' };
  return React.createElement('div', {
    style: {
      width: '100%', height: 120, flexShrink: 0,
      background: s.bg,
      borderTop: '2px solid ' + (T?.border||'#333'),
      borderBottom: '2px solid ' + (T?.border||'#333'),
    }
  });
}

function WorldMap({ player, T, tf, onClose, inline }) {
  const canvasRef = React.useRef(null);
  const W = 920, H = 620;
  const MAP_W = 700, MAP_H = 580, MAP_X = 10, MAP_Y = 10;
  const KEY_X = 725, KEY_Y = 20;

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const g = canvas.getContext('2d');
    g.clearRect(0,0,W,H);

    const explored = new Set(player.exploredLocations || [player.location]);
    const current  = player.location;

    const PAD = 44;
    const toScreen = (mx, my) => ({
      x: MAP_X + PAD + (mx / 100) * (MAP_W - PAD*2),
      y: MAP_Y + PAD + (my / 100) * (MAP_H - PAD*2)
    });

    // ── Map background ──────────────────────────────────────────────────
    const bgGrd = g.createLinearGradient(MAP_X,MAP_Y,MAP_X,MAP_Y+MAP_H);
    bgGrd.addColorStop(0,'#060810'); bgGrd.addColorStop(1,'#0d1220');
    g.fillStyle=bgGrd; g.fillRect(MAP_X,MAP_Y,MAP_W,MAP_H);

    // Parchment noise
    for(let i=0;i<600;i++){
      g.globalAlpha=0.016+Math.random()*0.022;
      g.fillStyle=Math.random()>0.5?'#c0a860':'#7a5a28';
      const nx=MAP_X+Math.random()*MAP_W, ny=MAP_Y+Math.random()*MAP_H, ns=Math.random()*3+1;
      g.fillRect(nx,ny,ns,ns);
    }
    g.globalAlpha=1;

    // Map border
    g.strokeStyle='#c9a84c'; g.lineWidth=2;
    g.strokeRect(MAP_X+6,MAP_Y+6,MAP_W-12,MAP_H-12);
    g.strokeStyle='rgba(201,168,76,0.25)'; g.lineWidth=1;
    g.strokeRect(MAP_X+10,MAP_Y+10,MAP_W-20,MAP_H-20);

    // Title
    g.font='bold 13px Cinzel,serif'; g.fillStyle='#c9a84c';
    g.textAlign='center';
    g.fillText('AETHERMOOR', MAP_X+MAP_W/2, MAP_Y+22);
    g.font='9px Cinzel,serif'; g.fillStyle='#7a6030';
    g.fillText('— Known Lands —', MAP_X+MAP_W/2, MAP_Y+34);

    // Compass rose
    const cx=MAP_X+MAP_W-36, cy=MAP_Y+MAP_H-36;
    g.font='bold 8px Cinzel,serif'; g.fillStyle='#c9a84c88'; g.textAlign='center';
    g.fillText('N',cx,cy-16); g.fillText('S',cx,cy+21); g.fillText('E',cx+18,cy+4); g.fillText('W',cx-18,cy+4);
    g.strokeStyle='#c9a84c33'; g.lineWidth=1;
    g.beginPath(); g.moveTo(cx,cy-12); g.lineTo(cx,cy+12); g.stroke();
    g.beginPath(); g.moveTo(cx-12,cy); g.lineTo(cx+12,cy); g.stroke();

    // ── Road styles ─────────────────────────────────────────────────────
    const ROAD_STYLE = {
      highway: { color:'#c9a84c', width:3,  dash:[],       fogColor:'rgba(201,168,76,0.35)',  fogWidth:2 },
      road:    { color:'#7a6c50', width:2,  dash:[],       fogColor:'rgba(122,108,80,0.35)',  fogWidth:1.5 },
      dirt:    { color:'#5a4430', width:1.5,dash:[5,4],    fogColor:'rgba(90,68,48,0.3)',     fogWidth:1 },
      trail:   { color:'#3a5030', width:1,  dash:[3,5],    fogColor:'rgba(58,80,48,0.25)',    fogWidth:1 },
      track:   { color:'#382818', width:1,  dash:[2,6],    fogColor:'rgba(56,40,24,0.2)',     fogWidth:0.8 },
    };

    // Draw roads
    ROADS.forEach(road => {
      const fromData = WORLD_DATA.find(w=>w.name===road.from);
      const toData   = WORLD_DATA.find(w=>w.name===road.to);
      if (!fromData||!toData) return;
      const fromEx = explored.has(road.from);
      const toEx   = explored.has(road.to);
      if (!fromEx && !toEx) return;

      const fs = toScreen(fromData.mapX, fromData.mapY);
      const ts = toScreen(toData.mapX,   toData.mapY);
      const rs  = ROAD_STYLE[road.roadType] || ROAD_STYLE.dirt;
      const both = fromEx && toEx;

      g.save();
      g.strokeStyle = both ? rs.color : rs.fogColor;
      g.lineWidth   = both ? rs.width : rs.fogWidth;
      g.setLineDash(both ? rs.dash : [4,6]);
      g.beginPath(); g.moveTo(fs.x,fs.y); g.lineTo(ts.x,ts.y); g.stroke();
      g.restore();
    });

    // ── Settlement / POI nodes ───────────────────────────────────────────
    const NODE = {
      capital:       { r:9,  fill:'#2a2010', stroke:'#c9a84c', label:'#fffce0', icon:'🏰' },
      city:          { r:6,  fill:'#1a2030', stroke:'#6090c0', label:'#90b8e0', icon:'🏙️' },
      town:          { r:5,  fill:'#1a2018', stroke:'#60885a', label:'#88a870', icon:'🏘️' },
      village:       { r:4,  fill:'#1c1a10', stroke:'#706448', label:'#a08c68', icon:'🏡' },
      hamlet:        { r:3,  fill:'#181410', stroke:'#4c4030', label:'#806858', icon:'🛖' },
      farm_arable:   { r:2,  fill:'#101808', stroke:'#384828', label:'#587040', icon:'🌾' },
      farm_livestock:{ r:2,  fill:'#181008', stroke:'#403020', label:'#706040', icon:'🐄' },
      farm_mixed:    { r:2,  fill:'#141408', stroke:'#383820', label:'#606040', icon:'🌿' },
      poi_forest:    { r:4,  fill:'#0c1808', stroke:'#386020', label:'#5a9038', icon:'🌲' },
      poi_cave:      { r:4,  fill:'#180c08', stroke:'#583830', label:'#a05838', icon:'🕳️' },
      poi_ruins:     { r:4,  fill:'#101008', stroke:'#484030', label:'#907850', icon:'🏚️' },
      poi_wood:      { r:4,  fill:'#0c0818', stroke:'#382050', label:'#7050a0', icon:'🌳' },
      poi_shrine:    { r:4,  fill:'#180808', stroke:'#603020', label:'#c06030', icon:'⛩️' },
    };

    WORLD_DATA.forEach(loc => {
      const isFarm = loc.type.startsWith('farm');

      if (!explored.has(loc.name)) {
        // Show ? if adjacent to explored node
        const adj = ROADS.find(r=>(r.from===loc.name&&explored.has(r.to))||(r.to===loc.name&&explored.has(r.from)));
        if (!adj) return;
        const s = toScreen(loc.mapX, loc.mapY);
        g.globalAlpha=0.4;
        g.font='bold 9px serif'; g.fillStyle='#806040'; g.textAlign='center';
        g.fillText('?', s.x, s.y+4);
        g.globalAlpha=1;
        return;
      }

      if (isFarm) return; // farms hidden — too cluttered

      const nd = NODE[loc.type];
      if (!nd) return;
      const s = toScreen(loc.mapX, loc.mapY);
      const isCur = loc.name === current;

      // Current location glow
      if (isCur) {
        const grd = g.createRadialGradient(s.x,s.y,0,s.x,s.y,nd.r*5);
        grd.addColorStop(0,'rgba(201,168,76,0.55)'); grd.addColorStop(1,'rgba(201,168,76,0)');
        g.fillStyle=grd; g.fillRect(s.x-nd.r*5,s.y-nd.r*5,nd.r*10,nd.r*10);
      }

      // Circle
      g.beginPath(); g.arc(s.x,s.y,nd.r,0,Math.PI*2);
      g.fillStyle=nd.fill; g.fill();
      g.strokeStyle=isCur?'#fffce0':nd.stroke; g.lineWidth=isCur?2:1; g.stroke();

      // Icon inside circle
      g.font=`${nd.r*1.5}px serif`; g.textAlign='center';
      g.fillText(nd.icon, s.x, s.y + nd.r*0.55);

      // Waymarker ◆ above current
      if (isCur) {
        g.font='bold 12px serif'; g.fillStyle='#fffce0'; g.textAlign='center';
        g.fillText('◆', s.x, s.y - nd.r - 4);
      }

      // Label
      const short = loc.name.length > 14 ? loc.name.split(' ')[0] : loc.name;
      g.font = isCur ? 'bold 8px Cinzel,serif' : '7px Cinzel,serif';
      g.fillStyle = isCur ? '#fffce0' : nd.label;
      g.textAlign = 'center';
      g.fillText(short, s.x, s.y + nd.r + 10);
    });

    // ── KEY PANEL ────────────────────────────────────────────────────────
    // Background
    g.fillStyle='#08090e'; g.fillRect(KEY_X,KEY_Y,W-KEY_X-8,H-KEY_Y-8);
    g.strokeStyle='#c9a84c44'; g.lineWidth=1; g.strokeRect(KEY_X,KEY_Y,W-KEY_X-8,H-KEY_Y-8);

    g.font='bold 9px Cinzel,serif'; g.fillStyle='#c9a84c'; g.textAlign='left';
    g.fillText('MAP KEY', KEY_X+10, KEY_Y+16);

    // Divider
    g.strokeStyle='#c9a84c33'; g.lineWidth=1;
    g.beginPath(); g.moveTo(KEY_X+6,KEY_Y+22); g.lineTo(W-14,KEY_Y+22); g.stroke();

    // ── Settlements ──
    g.font='bold 8px Cinzel,serif'; g.fillStyle='#806030'; g.textAlign='left';
    g.fillText('SETTLEMENTS', KEY_X+10, KEY_Y+35);

    const settlementKeys = [
      { icon:'🏰', label:'Capital',  col:'#c9a84c' },
      { icon:'🏙️', label:'City',     col:'#6090c0' },
      { icon:'🏘️', label:'Town',     col:'#60885a' },
      { icon:'🏡', label:'Village',  col:'#706448' },
      { icon:'🛖', label:'Hamlet',   col:'#4c4030' },
      { icon:'🌾', label:'Farm',     col:'#387030' },
    ];
    settlementKeys.forEach((sk,i) => {
      const ky = KEY_X+10, kx = KEY_Y+47+i*16;
      g.font='12px serif'; g.fillText(sk.icon, ky, kx+2);
      g.font='8px Cinzel,serif'; g.fillStyle=sk.col;
      g.fillText(sk.label, ky+18, kx+2);
    });

    // Divider
    const divY1 = KEY_Y+144;
    g.strokeStyle='#c9a84c22'; g.lineWidth=1;
    g.beginPath(); g.moveTo(KEY_X+6,divY1); g.lineTo(W-14,divY1); g.stroke();

    // ── Points of Interest ──
    g.font='bold 8px Cinzel,serif'; g.fillStyle='#806030'; g.textAlign='left';
    g.fillText('POINTS OF INTEREST', KEY_X+10, divY1+13);

    const poiKeys = [
      { icon:'🌲', label:'Ancient Forest', col:'#5a9038' },
      { icon:'🕳️', label:'Cave',           col:'#a05838' },
      { icon:'🏚️', label:'Ancient Ruins',  col:'#907850' },
      { icon:'🌳', label:'Dark Wood',      col:'#7050a0' },
      { icon:'⛩️', label:'Forgotten Shrine',col:'#c06030' },
    ];
    poiKeys.forEach((pk,i) => {
      const ky = KEY_X+10, kx = divY1+25+i*16;
      g.font='12px serif'; g.fillText(pk.icon, ky, kx+2);
      g.font='8px Cinzel,serif'; g.fillStyle=pk.col;
      g.fillText(pk.label, ky+18, kx+2);
    });

    // Divider
    const divY2 = divY1+108;
    g.strokeStyle='#c9a84c22'; g.lineWidth=1;
    g.beginPath(); g.moveTo(KEY_X+6,divY2); g.lineTo(W-14,divY2); g.stroke();

    // ── Road types ──
    g.font='bold 8px Cinzel,serif'; g.fillStyle='#806030'; g.textAlign='left';
    g.fillText('ROADS', KEY_X+10, divY2+13);

    const roadKeys = [
      { type:'highway', label:"King's Road",     desc:'Capital / City' },
      { type:'road',    label:'Merchant Road',   desc:'City / Town'    },
      { type:'dirt',    label:'Dirt Road',       desc:'Village / Hamlet' },
      { type:'trail',   label:'Trail',           desc:'Points of Interest' },
      { type:'track',   label:'Farm Track',      desc:'Farms'          },
    ];
    roadKeys.forEach((rk,i) => {
      const ry = divY2 + 26 + i*22;
      const rs = ROAD_STYLE[rk.type];
      g.save();
      g.strokeStyle = rs.color; g.lineWidth = rs.width;
      g.setLineDash(rs.dash);
      g.beginPath(); g.moveTo(KEY_X+10, ry); g.lineTo(KEY_X+50, ry); g.stroke();
      g.restore();
      g.font='bold 8px Cinzel,serif'; g.fillStyle=rs.color; g.textAlign='left';
      g.fillText(rk.label, KEY_X+56, ry+3);
      g.font='7px Cinzel,serif'; g.fillStyle='#504030';
      g.fillText(rk.desc, KEY_X+56, ry+13);
    });

    // Divider
    const divY3 = divY2 + 140;
    g.strokeStyle='#c9a84c22'; g.lineWidth=1;
    g.beginPath(); g.moveTo(KEY_X+6,divY3); g.lineTo(W-14,divY3); g.stroke();

    // ── Markers ──
    g.font='bold 8px Cinzel,serif'; g.fillStyle='#806030'; g.textAlign='left';
    g.fillText('MARKERS', KEY_X+10, divY3+13);

    const markerKeys = [
      { sym:'◆', col:'#fffce0', label:'Your location' },
      { sym:'?',  col:'#806040', label:'Unexplored nearby' },
    ];
    markerKeys.forEach((mk,i) => {
      const my = divY3+26+i*16;
      g.font='bold 10px serif'; g.fillStyle=mk.col; g.textAlign='left';
      g.fillText(mk.sym, KEY_X+13, my+3);
      g.font='8px Cinzel,serif'; g.fillStyle=mk.col;
      g.fillText(mk.label, KEY_X+26, my+3);
    });

  }, [player]);

    if (inline) {
    return React.createElement('div', {
      style:{ width:'100%', height:'100%', position:'relative', background:'#080608' }
    },
      React.createElement('canvas', {
        ref: canvasRef, width: W, height: H,
        style:{ display:'block', width:'100%', height:'100%', objectFit:'contain' }
      })
    );
  }
  return React.createElement('div', {
    style:{
      position:'fixed',top:0,left:0,width:'100%',height:'100%',
      background:'rgba(0,0,0,0.90)',zIndex:1000,
      display:'flex',alignItems:'center',justifyContent:'center'
    },
    onClick: onClose
  },
    React.createElement('div', {
      style:{ position:'relative' },
      onClick: e => e.stopPropagation()
    },
      React.createElement('canvas', {
        ref: canvasRef, width: W, height: H,
        style:{ display:'block', maxWidth:'96vw', maxHeight:'92vh', borderRadius:4 }
      }),
      React.createElement('button', {
        onClick: onClose,
        style:{
          position:'absolute',top:14,right:14,
          background:'rgba(0,0,0,0.75)',border:'1px solid #c9a84c',
          color:'#c9a84c',padding:'4px 10px',cursor:'pointer',
          fontFamily:'Cinzel,serif',fontSize:10,borderRadius:2,
          letterSpacing:1
        }
      }, '✕ Close')
    )
  );
}


function InputBar({ player, onFreeText, isLoading, T, tf, isDyslexic, fillInput }) {
  const [text, setText] = React.useState('');
  const inputRef = React.useRef(null);
  const ff  = isDyslexic ? "'OpenDyslexic',Arial,sans-serif" : "'Crimson Text',Georgia,serif";
  const cin = isDyslexic ? "'OpenDyslexic',Arial,sans-serif" : "'Cinzel','Palatino Linotype',serif";
  const ctx = player?.context || 'explore';

  React.useEffect(() => {
    if (fillInput) { setText(fillInput); inputRef.current?.focus(); }
  }, [fillInput]);

  const submit = () => {
    const t = text.trim();
    if (!t || isLoading) return;
    onFreeText(t);
    setText('');
    inputRef.current?.focus();
  };

  // Context hint for placeholder
  const placeholders = {
    combat:  isLoading ? 'The dice are cast...' : 'What do you do? (attack, dodge, cast a spell...)',
    town:    isLoading ? 'The world stirs...'   : 'What do you do?',
    npc:     isLoading ? 'They await your words...' : 'What do you say?',
    dungeon: isLoading ? 'The darkness listens...' : 'What do you do?',
    camp:    isLoading ? 'The fire crackles...'  : 'What do you do?',
    explore: isLoading ? 'The Fates weave your story...' : 'What do you do?',
  };

  return React.createElement('div', {
    style: { background: T.panelAlt, borderTop: `2px solid ${T.border}`, flexShrink: 0 }
  },
    React.createElement('div', {
      style: { display: 'flex', gap: 8, padding: '10px 10px', alignItems: 'center' }
    },
      React.createElement('input', {
        ref: inputRef,
        value: text,
        onChange: e => setText(e.target.value),
        onKeyDown: e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } },
        placeholder: placeholders[ctx] || placeholders.explore,
        disabled: isLoading,
        style: {
          flex: 1,
          background: T.inputBg || T.bg,
          border: `1px solid ${T.border}`,
          color: T.text,
          padding: '11px 14px',
          fontSize: isDyslexic ? 15 : 14,
          fontFamily: ff,
          outline: 'none',
          borderRadius: 4,
          opacity: isLoading ? 0.5 : 1,
          letterSpacing: isDyslexic ? '0.05em' : 'normal',
          transition: 'border-color 0.15s',
        },
        onFocus: e => { e.target.style.borderColor = T.accent; },
        onBlur:  e => { e.target.style.borderColor = T.border; },
      }),
      React.createElement('button', {
        onClick: submit,
        disabled: isLoading || !text.trim(),
        style: {
          background: text.trim() && !isLoading ? T.accent + '22' : 'transparent',
          border: `1px solid ${text.trim() && !isLoading ? T.accent : T.border}`,
          color: text.trim() && !isLoading ? T.gold : T.textFaint,
          padding: '11px 16px',
          cursor: isLoading || !text.trim() ? 'default' : 'pointer',
          fontSize: 16, borderRadius: 4,
          transition: 'all 0.15s',
          opacity: isLoading || !text.trim() ? 0.35 : 1,
          fontFamily: cin,
        }
      }, '▶')
    )
  );
}

function AuthScreen({ onAuth, resetToken }) {
    // Discord OAuth constants
    const DISCORD_CLIENT_ID = '1480701445266477196';
    const DISCORD_REDIRECT_URI = window.location.origin + window.location.pathname;

    // On mount: check for Discord OAuth code in URL
    useEffect(() => {
      const params = new URLSearchParams(window.location.search);
